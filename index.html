<style>
  :root {
    --ink: #1a1714;
    --ink-soft: #4a423b;
    --ink-faint: #8a7f74;
    --paper: #f4efe6;
    --paper-card: #fbf8f1;
    --paper-line: #e4dccd;
    --rule: #d8cdb9;
    --brass: #a9712b;
    --brass-deep: #855618;
    --green: #3f6b4a;
    --green-bg: #e6efe5;
    --red: #9c3a2e;
    --red-bg: #f2e3df;
    --amber-bg: #f3ead3;
    --amber-tx: #876418;
    --shadow: 0 1px 2px rgba(26,23,20,.06), 0 8px 24px rgba(26,23,20,.05);
    --radius: 3px;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    background-image: linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size: 100% 2.4rem;
    background-position: 0 -1px;

  .num { font-family: 'JetBrains Mono', monospace; font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
  .serif { font-family: 'Fraunces', Georgia, serif; }

  header {
    background: var(--ink);
    color: var(--paper);
    border-bottom: 3px solid var(--brass);
    position: sticky; top: 0; z-index: 40;
  }
  .bar {
    max-width: 1180px; margin: 0 auto; padding: 0 24px;

  .logo { display: flex; align-items: baseline; gap: 10px; cursor: pointer; }
  .logo .mark {

  }
  .logo .mark b { color: var(--brass); font-weight: 600; }
  .logo .sub {

  .crumbs { margin-left: 6px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #b6a995; }

  .spacer { flex: 1; }
  .navlink { font-family:'JetBrains Mono',monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #c8bba6; cursor: pointer; padding: 6px 4px; text-decoration: none; transition: color .15s; }
  .navlink:hover { color: var(--paper); }
  .navlink.active { color: var(--brass); }
  .conn {
    display: flex; align-items: center; gap: 7px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #c8bba6; padding: 5px 11px; border: 1px solid #3a342d; border-radius: 999px;
    cursor: pointer; transition: border-color .15s;

  .conn:hover { border-color: var(--brass); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber-tx); box-shadow: 0 0 0 3px rgba(135,100,24,.2); }
  .dot.live { background: #6fae7a; box-shadow: 0 0 0 3px rgba(111,174,122,.2); }

  main { max-width: 1180px; margin: 0 auto; padding: 34px 24px 80px; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 26px; flex-wrap: wrap; }
  h1.title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 34px; letter-spacing: -.4px; line-height: 1.1; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 2.5px; color: var(--brass-deep); margin-bottom: 8px; }
  .lede { color: var(--ink-soft); font-size: 14.5px; margin-top: 6px; max-width: 60ch; }

  .btn {
    font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px;
    padding: 9px 16px; border-radius: var(--radius); border: 1px solid transparent;
    cursor: pointer; transition: all .14s; display: inline-flex; align-items: center; gap: 7px;

  .btn-primary { background: var(--brass); color: #fff; border-color: var(--brass-deep); box-shadow: var(--shadow); }
  .btn-primary:hover { background: var(--brass-deep); }
  .btn-ghost { background: transparent; color: var(--ink-soft); border-color: var(--rule); }
  .btn-ghost:hover { border-color: var(--ink-faint); background: var(--paper-card); }
  .btn-sm { padding: 6px 11px; font-size: 13px; }
  .btn .ic { width: 15px; height: 15px; stroke-width: 2; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-bottom: 30px;
    background: var(--paper-card); border: 1px solid var(--paper-line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .stat { padding: 18px 20px; border-right: 1px solid var(--paper-line); position: relative; }
  .stat:last-child { border-right: none; }
  .stat .k { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-faint); margin-bottom: 8px; }
  .stat .v { font-family: 'JetBrains Mono', monospace; font-size: 25px; font-weight: 600; letter-spacing: -.5px; }
  .stat .v.pos { color: var(--ink); }
  .stat .v.due { color: var(--red); }
  .stat .v.paid { color: var(--green); }
  .stat .meta { font-size: 12px; color: var(--ink-faint); margin-top: 4px; }
  .stat::after { content:""; position:absolute; left:20px; bottom:0; width:24px; height:3px; background: var(--brass); opacity:.55; }

  .sec-head { display: flex; align-items: baseline; justify-content: space-between; margin: 0 0 14px; gap: 12px; }
  .sec-head h2 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; }
  .sec-head .count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-faint); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; }
  .site {
    background: var(--paper-card); border: 1px solid var(--paper-line); border-radius: var(--radius);
    padding: 0; box-shadow: var(--shadow); cursor: pointer; transition: transform .14s, box-shadow .14s, border-color .14s;

  .site:hover { transform: translateY(-2px); box-shadow: 0 2px 4px rgba(26,23,20,.07), 0 14px 32px rgba(26,23,20,.09); border-color: var(--rule); }

  .site .nm { font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; line-height: 1.2; margin-bottom: 3px; }

  .site .pills { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }

  .pill.due { background: var(--red-bg); color: var(--red); }
  .pill.ok { background: var(--green-bg); color: var(--green); }
  .add-site {
    border: 1.5px dashed var(--rule); background: transparent; border-radius: var(--radius);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; color: var(--ink-faint); min-height: 150px; transition: all .14s; font-weight: 500;
  }
  .add-site:hover { border-color: var(--brass); color: var(--brass-deep); background: var(--paper-card); }
  .add-site .plus { font-size: 26px; line-height: 1; }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid var(--rule); }
  .tab { font-family:'JetBrains Mono',monospace; font-size: 12.5px; text-transform: uppercase; letter-spacing: 1px; padding: 10px 16px; background: transparent; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer; color: var(--ink-faint); font-weight: 500; transition: all .14s; }
  .tab:hover { color: var(--ink-soft); }
  .tab.active { color: var(--brass-deep); border-bottom-color: var(--brass); }

  .ledger-wrap { background: var(--paper-card); border: 1px solid var(--paper-line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .toolbar { display: flex; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--paper-line); align-items: center; flex-wrap: wrap; }
  .search { flex: 1; min-width: 180px; position: relative; }
  .search input {
    width: 100%; padding: 8px 12px 8px 34px; border: 1px solid var(--rule); border-radius: var(--radius);
    background: var(--paper); font-family: 'Inter'; font-size: 14px; color: var(--ink);
  }
  .search input:focus { outline: none; border-color: var(--brass); }
  .search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--ink-faint); }
  select.filter { padding: 8px 12px; border: 1px solid var(--rule); border-radius: var(--radius); background: var(--paper); font-family: 'Inter'; font-size: 14px; color: var(--ink-soft); cursor: pointer; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--ink-faint); text-align: left; padding: 11px 16px; border-bottom: 2px solid var(--rule); font-weight: 500; background: var(--paper);
  }
  thead th.r { text-align: right; }
  tbody td { padding: 13px 16px; border-bottom: 1px solid var(--paper-line); font-size: 14px; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .1s; }
  tbody tr:hover { background: #f6f1e6; }
  .vendor { font-weight: 500; }
  .cat-tag { font-family: 'JetBrains Mono'; font-size: 11px; padding: 2px 8px; border-radius: 3px; background: var(--amber-bg); color: var(--amber-tx); white-space: nowrap; }
  td.amt { font-family: 'JetBrains Mono', monospace; text-align: right; font-weight: 600; font-size: 14.5px; }
  .status-chip { display:inline-flex; align-items:center; gap:5px; font-family:'JetBrains Mono'; font-size:11.5px; font-weight:500; padding: 3px 9px; border-radius: 999px; cursor: pointer; border: 1px solid transparent; }
  .status-chip.paid { background: var(--green-bg); color: var(--green); }
  .status-chip.unpaid { background: var(--red-bg); color: var(--red); }
  .status-chip:hover { border-color: currentColor; }
  .pdf-link { display:inline-flex; align-items:center; gap:5px; color: var(--brass-deep); cursor:pointer; font-size:13px; font-weight:500; }
  .pdf-link:hover { text-decoration: underline; }
  .pdf-none { color: var(--ink-faint); font-size: 12.5px; }
  .row-act { color: var(--ink-faint); cursor: pointer; padding: 4px; border-radius: 3px; }
  .row-act:hover { color: var(--red); background: var(--red-bg); }

  .empty { text-align: center; padding: 60px 20px; color: var(--ink-faint); }

  .overlay { position: fixed; inset: 0; background: rgba(26,23,20,.45); backdrop-filter: blur(2px); z-index: 60; display: flex; align-items: flex-start; justify-content: center; padding: 40px 18px; overflow-y: auto; }
  .modal { background: var(--paper-card); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,.3); width: 100%; max-width: 540px; border: 1px solid var(--paper-line); overflow: hidden; }

  .modal-head .x { cursor:pointer; color: var(--ink-faint); font-size: 22px; line-height: 1; padding: 2px 6px; border-radius: 3px; }
  .modal-head .x:hover { background: var(--paper-line); color: var(--ink); }
  .modal-body { padding: 22px 24px; }
  .field { margin-bottom: 16px; }
  .field.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label { display:block; font-family:'JetBrains Mono'; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-soft); margin-bottom: 6px; font-weight: 500; }
  input.fld, select.fld, textarea.fld {
    width: 100%; padding: 9px 12px; border: 1px solid var(--rule); border-radius: var(--radius);

  textarea.fld { resize: vertical; min-height: 60px; font-family:'Inter'; }

  .file-drop {
    border: 1.5px dashed var(--rule); border-radius: var(--radius); padding: 16px; text-align: center;
    cursor: pointer; color: var(--ink-faint); font-size: 13.5px; transition: all .14s;

  .file-drop.has { border-style: solid; border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .modal-foot { padding: 16px 24px; border-top: 1px solid var(--paper-line); display:flex; justify-content:flex-end; gap: 10px; background: var(--paper); }

  .banner {
    background: var(--amber-bg); border: 1px solid #e0d2ad; border-left: 3px solid var(--amber-tx);
    border-radius: var(--radius); padding: 12px 16px; margin-bottom: 24px; font-size: 13.5px; color: #6e5414;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .banner b { color: var(--amber-tx); }
  .banner .lnk { color: var(--brass-deep); text-decoration: underline; cursor: pointer; font-weight:500; }

  .gate {
    position: fixed; inset: 0; z-index: 100; background: var(--ink);
    display: flex; align-items: center; justify-content: center; padding: 24px;
    background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 100% 2.4rem;
  }
  .gate-card {
    background: var(--paper-card); border: 1px solid #2a241e; border-top: 3px solid var(--brass);
    border-radius: var(--radius); box-shadow: 0 24px 70px rgba(0,0,0,.5);
    width: 100%; max-width: 360px; padding: 38px 34px 34px; text-align: center;
  }
  .gate-mark { font-family:'Fraunces',serif; font-weight:600; font-size: 32px; color: var(--ink); letter-spacing:.3px; }
  .gate-mark b { color: var(--brass); }
  .gate-sub { font-family:'JetBrains Mono',monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: 3px; color: var(--ink-faint); margin: 4px 0 28px; }
  .gate-in {
    width: 100%; padding: 11px 14px; border: 1px solid var(--rule); border-radius: var(--radius);
    background: var(--paper); font-family:'Inter'; font-size: 15px; color: var(--ink); text-align: center; letter-spacing: 1px;
  }
  .gate-in:focus { outline: none; border-color: var(--brass); box-shadow: 0 0 0 3px rgba(169,113,43,.15); }
  .gate-btn { width: 100%; justify-content: center; margin-top: 14px; padding: 11px; }
  .gate-err { color: var(--red); font-size: 13px; margin-top: 14px; font-family:'JetBrains Mono'; }

  @media (max-width: 760px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .stat:nth-child(2) { border-right: none; }
    .stat:nth-child(1), .stat:nth-child(2) { border-bottom: 1px solid var(--paper-line); }
    .bar { gap: 10px; padding: 0 16px; }
    .crumbs { display: none; }
    .conn .ct { display: none; }
    h1.title { font-size: 27px; }
    main { padding: 24px 16px 60px; }
    .col-hide { display: none; }
    .field.row2 { grid-template-columns: 1fr; }
  }
</style>
</head>

function renderCrumbs(){
  const c = document.getElementById("crumbs");
  if(view.name==="site"){
    const s = siteById(view.siteId);
    c.innerHTML = `<a onclick="go('dashboard')">All sites</a><span class="sep">/</span><span>${esc(s?s.name:"")}</span>`;
  } else if(view.name==="vendors"){
    c.innerHTML = `<a onclick="go('dashboard')">All sites</a><span class="sep">/</span><span>Vendors</span>`;
  } else c.innerHTML = "";
  const nv = document.getElementById('navVendors');
  if(nv) nv.classList.toggle('active', view.name==="vendors");
}

function renderDashboard(){
  const expense = BILLS.reduce((s,b)=>s+Number(b.amount),0);

  const due = BILLS.filter(b=>b.status==="unpaid").reduce((s,b)=>s+Number(b.amount),0);

  app.innerHTML = `
    ${LIVE ? "" : demoBanner()}
    <div class="page-head">
      <div>
        <div class="eyebrow">Portfolio overview</div>
        <h1 class="title">The Books</h1>
        <div class="lede">Income, expenses and what's outstanding across every property.</div>

      <button class="btn btn-primary" onclick="openSiteModal()">${icon('plus')} New site</button>
    </div>

    <div class="stats">

      <div class="stat"><div class="k">Total expenditure</div><div class="v due num">${fmt(expense)}</div><div class="meta">${BILLS.length} bills</div></div>
      <div class="stat"><div class="k">Net</div><div class="v num" style="color:${net>=0?'var(--green)':'var(--red)'}">${net<0?'−':''}${fmt(Math.abs(net))}</div><div class="meta">income − expenses</div></div>

function siteCard(s){

  return `<div class="site" onclick="go('site','${s.id}')">

  render();
}
function editBill(id){ openBillModal(BILLS.find(b=>b.id===id).site_id, id); }
async function delBill(id){
  if(!confirm("Delete this bill? This can't be undone.")) return;
  BILLS = BILLS.filter(b=>b.id!==id);
  if(LIVE) await sb.from('bills').delete().eq('id',id);
  render();
}
async function openPdf(id){
  const b = BILLS.find(x=>x.id===id);
  if(!b) return;
  if(LIVE && b.pdf_path){
    const { data } = sb.storage.from('bills').getPublicUrl(b.pdf_path);
    if(data && data.publicUrl){ openViewer(data.publicUrl, b.pdf_kind, b.pdf_name); return; }
  }
  if(b._pdfData){ openViewer(b._pdfData, b.pdf_kind, b.pdf_name); return; }
  alert("In demo mode this is a placeholder.\nFile on record: "+(b.pdf_name||"none")+"\n\nWhen connected to Supabase, the actual file opens here.");
}
function openViewer(url, kind, name){
  const isImg = kind==="image" || /\.(jpe?g|png|gif|webp)$/i.test(name||url);
  const w = window.open();
  if(!w){ window.location.href=url; return; }
  const body = isImg
    ? `<img src="${url}" style="max-width:100%;height:auto;display:block;margin:0 auto" />`
    : `<iframe src="${url}" style="border:0;width:100%;height:100vh"></iframe>`;
  w.document.write(`<title>${esc(name||'Bill')}</title><body style="margin:0;background:#1a1714">${body}</body>`);
}

            <span id="dropTxt">${b&&b.pdf_name?icon('file')+' '+esc(b.pdf_name)+' — click to replace':'Click to attach a PDF, JPG or HEIC photo'}</span>
          </div>
          <input type="file" id="pdfIn" accept="application/pdf,image/jpeg,image/jpg,image/png,image/heic,image/heif,.heic,.heif" style="display:none" onchange="handlePdf(this)" />
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveBill('${siteId}','${billId||''}')">${b?'Save changes':'Add bill'}</button>
      </div>
    </div></div>`;
  setTimeout(()=>document.getElementById('bVendor').focus(),50);
}async function handlePdf(inp){
  let f = inp.files[0]; if(!f) return;
  const name = f.name.toLowerCase();
  const isHeic = f.type==="image/heic" || f.type==="image/heif" || name.endsWith(".heic") || name.endsWith(".heif");
  const isPdf = f.type==="application/pdf" || name.endsWith(".pdf");
  const isImg = f.type.startsWith("image/") || /\.(jpe?g|png)$/.test(name);
  if(!isPdf && !isImg && !isHeic){ alert("Please attach a PDF, JPG, PNG or HEIC file."); return; }

  const drop = document.getElementById('drop');
  const txt = document.getElementById('dropTxt');

  if(isHeic){
    txt.innerHTML = "Converting iPhone photo…";
    try {
      const blob = await heic2any({ blob:f, toType:"image/jpeg", quality:0.85 });
      const out = Array.isArray(blob)?blob[0]:blob;
      f = new File([out], f.name.replace(/\.(heic|heif)$/i,".jpg"), { type:"image/jpeg" });
    } catch(e){
      console.error(e); alert("Couldn't convert that HEIC photo. Try exporting it as JPG from Photos, or attach a different file."); 
      txt.innerHTML = "Click to attach a PDF, JPG or HEIC photo"; return;
    }
  }

  const kind = (f.type==="application/pdf"||f.name.toLowerCase().endsWith(".pdf")) ? "pdf" : "image";
  const r = new FileReader();
  r.onload = e => { pendingPdf = { name:f.name, data:e.target.result, kind, file:f }; };
  r.readAsDataURL(f);
  drop.classList.add('has');
  txt.innerHTML = icon('file')+' '+esc(f.name);
}
async function saveBill(siteId, billId){
  const vendor=document.getElementById('bVendor').value.trim();
  const amount=parseFloat(document.getElementById('bAmount').value)||0;
  if(!vendor){ alert("Enter a vendor."); return; }
  if(amount<=0){ alert("Enter an amount."); return; }
  const rec = {
    site_id:siteId, vendor,
    amount, category:document.getElementById('bCat').value,
    issue_date:document.getElementById('bIssue').value||today(),
    due_date:document.getElementById('bDue').value||"",
    status:document.getElementById('bStatus').value,
    notes:document.getElementById('bNotes').value.trim(),
  };

  let uploadedPath = null;
  if(pendingPdf){
    rec.pdf_name = pendingPdf.name;
    rec.pdf_kind = pendingPdf.kind;
    if(LIVE && pendingPdf.file){
      const ext = pendingPdf.name.split('.').pop();
      const path = `${siteId}/${uid()}.${ext}`;
      const { error } = await sb.storage.from('bills').upload(path, pendingPdf.file, { upsert:true });
      if(error){ alert("File upload failed: "+error.message); }
      else { rec.pdf_path = path; uploadedPath = path; }
    }
  }

  if(billId){
    const b=BILLS.find(x=>x.id===billId); Object.assign(b,rec);
    if(pendingPdf){ b._pdfData=pendingPdf.data; b.pdf_kind=pendingPdf.kind; if(uploadedPath) b.pdf_path=uploadedPath; }
    if(LIVE) await sb.from('bills').update(rec).eq('id',billId);
  } else {
    const nb={id:uid(),...rec, pdf_name:pendingPdf?pendingPdf.name:"", pdf_kind:pendingPdf?pendingPdf.kind:""};
    if(pendingPdf) nb._pdfData=pendingPdf.data;
    BILLS.push(nb);
    if(LIVE){ const {data}=await sb.from('bills').insert(rec).select().single(); if(data) nb.id=data.id; }
  }
  closeModal(); render();
}

/* ---------- vendors page (all sites) ---------- */
let vendorSearch="";
function renderVendors(){
  const map = {};
  BILLS.forEach(b=>{
    const v = b.vendor||"(no vendor)";
    if(!map[v]) map[v] = { vendor:v, total:0, unpaid:0, count:0, sites:new Set(), bills:[] };
    map[v].total += Number(b.amount);
    if(b.status==="unpaid") map[v].unpaid += Number(b.amount);
    map[v].count++;
    map[v].sites.add(b.site_id);
    map[v].bills.push(b);
  });
  let vendors = Object.values(map).sort((a,b)=> b.total-a.total);
  if(vendorSearch){ const q=vendorSearch.toLowerCase(); vendors = vendors.filter(v=> v.vendor.toLowerCase().includes(q)); }
  const grandTotal = BILLS.reduce((s,b)=>s+Number(b.amount),0);

  app.innerHTML = `
    <div class="page-head">
      <div>
        <div class="eyebrow">Across all properties</div>
        <h1 class="title">Vendors</h1>
        <div class="lede">Every vendor you've paid, totalled across all sites.</div>
      </div>
    </div>

    <div class="stats" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat"><div class="k">Vendors</div><div class="v pos num">${Object.keys(map).length}</div><div class="meta">distinct</div></div>
      <div class="stat"><div class="k">Total spend</div><div class="v due num">${fmt(grandTotal)}</div><div class="meta">${BILLS.length} bills</div></div>
      <div class="stat"><div class="k">Outstanding</div><div class="v due num">${fmt(BILLS.filter(b=>b.status==='unpaid').reduce((s,b)=>s+Number(b.amount),0))}</div><div class="meta">unpaid to vendors</div></div>
    </div>

    <div class="ledger-wrap">
      <div class="toolbar">
        <div class="search">${icon('search')}<input placeholder="Search vendors…" value="${esc(vendorSearch)}" oninput="vendorSearch=this.value;renderVendors()" /></div>
      </div>
      ${vendors.length ? `
      <table>
        <thead><tr>
          <th>Vendor</th><th class="col-hide">Bills</th><th class="col-hide">Sites</th>
          <th class="r">Total</th><th class="r">Outstanding</th>
        </tr></thead>
        <tbody>${vendors.map(v=>`
          <tr style="cursor:pointer" onclick="toggleVendor('${esc(v.vendor).replace(/'/g,"\\'")}')">
            <td><div class="vendor">${esc(v.vendor)}</div></td>
            <td class="col-hide num" style="color:var(--ink-soft)">${v.count}</td>
            <td class="col-hide num" style="color:var(--ink-soft)">${v.sites.size}</td>
            <td class="amt">${fmt(v.total)}</td>
            <td class="amt" style="color:${v.unpaid>0?'var(--red)':'var(--ink-faint)'}">${v.unpaid>0?fmt(v.unpaid):'—'}</td>
          </tr>
          ${expandedVendor===v.vendor ? v.bills.slice().sort((a,b)=>(b.issue_date||"").localeCompare(a.issue_date||"")).map(b=>`
            <tr style="background:#f6f1e6">
              <td style="padding-left:32px;font-size:13px;color:var(--ink-soft)">${esc(siteById(b.site_id)?.name||'—')} · ${esc(b.category)}</td>
              <td class="col-hide num" style="font-size:12px;color:var(--ink-faint)">${dfmt(b.issue_date)}</td>
              <td class="col-hide"></td>
              <td class="amt" style="font-size:13px">${fmt(b.amount)}</td>
              <td class="amt" style="font-size:12px"><span class="status-chip ${b.status}">${b.status}</span></td>
            </tr>`).join('') : ''}
        `).join("")}</tbody>
      </table>` : `<div class="empty"><div class="serif">No vendors yet</div><div>Add bills with vendor names to see them here.</div></div>`}
    </div>
  `;
}
let expandedVendor=null;
function toggleVendor(v){ expandedVendor = expandedVendor===v?null:v; renderVendors(); }

/* ---------- connection panel ---------- */
function openConn(){
  mRoot.innerHTML = `<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:480px">
      <div class="modal-head"><h3>${LIVE?'Connected':'Demo mode'}</h3><span class="x" onclick="closeModal()">×</span></div>
      <div class="modal-body" style="font-size:14px;color:var(--ink-soft);line-height:1.6">
        ${LIVE
          ? `<p>You're live on Supabase. Sites, bills and PDFs save to your cloud project and sync to any browser.</p>`
          : `<p>Right now the app runs on <b>sample data</b> so you can try every feature. Nothing is saved permanently yet.</p>
             <p style="margin-top:12px">To make it real on any browser, create a free Supabase project and paste two values into the top of this file:</p>
             <div style="background:var(--paper);border:1px solid var(--rule);border-radius:3px;padding:12px;margin-top:10px;font-family:'JetBrains Mono';font-size:12.5px">SUPABASE_URL = "…"<br>SUPABASE_KEY = "…"</div>
             <p style="margin-top:12px;font-size:13px;color:var(--ink-faint)">I'll walk you through the setup when you're ready.</p>`}
      </div>
      <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Got it</button></div>
    </div></div>`;
}
function demoBanner(){
  return `<div class="banner">${icon('info')}
    <div><b>Demo mode.</b> You're looking at sample data so you can click around. Everything works — adding sites, bills, PDFs, marking paid. To save permanently across any browser, <span class="lnk" onclick="openConn()">connect Supabase</span>.</div>
  </div>`;
}

/* ---------- icons ---------- */
function icon(n){
  const p = {
    plus:'<path d="M12 5v14M5 12h14"/>',
    pin:'<path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/>',
    search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
    check:'<path d="M20 6 9 17l-5-5"/>',
    clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>',
    file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>',
    image:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/>',
    edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/>',
    trash:'<path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>',
    info:'<circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/>',
  }[n]||'';
  return `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
}
function esc(s){ return (s||"").toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- load live data if connected ---------- */
async function boot(){
  document.getElementById('connDot').classList.toggle('live', LIVE);
  document.getElementById('connText').textContent = LIVE ? "Connected" : "Demo data";
  if(LIVE){
    try {
      const {data:sites} = await sb.from('sites').select('*').order('name');
      const {data:bills} = await sb.from('bills').select('*');
      const {data:income} = await sb.from('income').select('*');
      if(sites) SITES=sites; if(bills) BILLS=bills; if(income) INCOME=income;
    } catch(e){ console.error("Supabase load failed:",e); }
  }
  render();
}

/* ---------- password gate ---------- */
function lockScreen(msg){
  document.getElementById('gate').innerHTML = `
    <div class="gate-card">
      <div class="gate-mark">Led<b>ger</b></div>
      <div class="gate-sub">Estate Books</div>
      <input type="password" id="gatePw" class="gate-in" placeholder="Enter password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')tryUnlock()" />
      <button class="btn btn-primary gate-btn" onclick="tryUnlock()">Unlock</button>
      ${msg?`<div class="gate-err">${msg}</div>`:''}
    </div>`;
  setTimeout(()=>{ const i=document.getElementById('gatePw'); if(i) i.focus(); },60);
}
function tryUnlock(){
  const v = document.getElementById('gatePw').value;
  if(v === APP_PASSWORD){
    try { sessionStorage.setItem('ledger_ok','1'); } catch(e){}
    document.getElementById('gate').style.display='none';
    boot();
  } else {
    lockScreen("That's not the password.");
  }
}
function startApp(){
  let unlocked = false;
  try { unlocked = sessionStorage.getItem('ledger_ok')==='1'; } catch(e){}
  if(!APP_PASSWORD || unlocked){
    document.getElementById('gate').style.display='none';
    boot();
  } else {
    lockScreen("");
  }
}
startApp();
</script>

</html>
